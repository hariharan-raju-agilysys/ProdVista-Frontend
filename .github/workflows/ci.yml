# =============================================================================
# ProdVista Frontend — CI / CD
# =============================================================================
# Standalone frontend repository (React + Vite + TypeScript).
#
# Triggers:
#   • push to main           → build + deploy to Azure Static Web Apps + Docker push
#   • pull_request to main   → build + lint + preview deploy
#   • workflow_dispatch       → manual run with optional environment override
#
# Required secrets (repository or environment level):
#   AZURE_ACR_LOGIN_SERVER              — e.g. myregistry.azurecr.io
#   AZURE_ACR_USERNAME                  — ACR service-principal / admin username
#   AZURE_ACR_PASSWORD                  — ACR service-principal / admin password
#   AZURE_STATIC_WEB_APPS_API_TOKEN    — Static Web Apps deployment token
#   VITE_AZURE_CLIENT_ID                — Azure AD app client ID (build-time)
#   VITE_AZURE_TENANT_ID                — Azure AD tenant ID (build-time)
#   VITE_REDIRECT_URI                   — OAuth redirect URI (build-time)
# =============================================================================

name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "production"
        type: choice
        options: [production, staging]

env:
  NODE_VERSION: "20"
  ACR_LOGIN_SERVER: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
  IMAGE_NAME: prodvista-frontend

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint, type-check and build the React / Vite app
  # ---------------------------------------------------------------------------
  build:
    name: Build & Lint
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        env:
          VITE_API_URL: ""
          VITE_API_TIMEOUT: "30000"
          VITE_APP_TITLE: "ProdVista Dashboard"
          VITE_AZURE_CLIENT_ID: ${{ secrets.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.VITE_AZURE_TENANT_ID }}
          VITE_REDIRECT_URI: ${{ secrets.VITE_REDIRECT_URI }}
          VITE_ENABLE_DEVTOOLS: "false"
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Job 2: Deploy to Azure Static Web Apps
  # ---------------------------------------------------------------------------
  deploy-static:
    name: Deploy to Azure Static Web Apps
    needs: build
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "."
          api_location: ""
          output_location: "dist"
        env:
          VITE_API_URL: ""
          VITE_API_TIMEOUT: "30000"
          VITE_APP_TITLE: "ProdVista Dashboard"
          VITE_AZURE_CLIENT_ID: ${{ secrets.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.VITE_AZURE_TENANT_ID }}
          VITE_REDIRECT_URI: ${{ secrets.VITE_REDIRECT_URI }}
          VITE_ENABLE_DEVTOOLS: "false"

  # ---------------------------------------------------------------------------
  # Job 3: Close preview environment when a PR is closed
  # ---------------------------------------------------------------------------
  close-preview:
    name: Close PR Preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Close Azure Static Web Apps preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close

  # ---------------------------------------------------------------------------
  # Job 4: Build Docker image (nginx) and push to ACR
  # ---------------------------------------------------------------------------
  docker-build-push:
    name: Docker Build & Push
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      full_image: ${{ steps.tag.outputs.full_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Compute image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "full_image=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.full_image }}:${{ steps.tag.outputs.tag }}
            ${{ steps.tag.outputs.full_image }}:latest
          build-args: |
            VITE_API_URL=
            VITE_API_TIMEOUT=30000
            VITE_APP_TITLE=ProdVista Dashboard
            VITE_AZURE_CLIENT_ID=${{ secrets.VITE_AZURE_CLIENT_ID }}
            VITE_AZURE_TENANT_ID=${{ secrets.VITE_AZURE_TENANT_ID }}
            VITE_REDIRECT_URI=${{ secrets.VITE_REDIRECT_URI }}
            VITE_ENABLE_DEVTOOLS=false
          cache-from: type=gha
          cache-to: type=gha,mode=max
