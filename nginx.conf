worker_processes  1;

events {
    worker_connections  1024;
}

http {
    server {
        listen 80;
        server_name  localhost;

        root   /usr/share/nginx/html;
        index  index.html index.htm;
        include /etc/nginx/mime.types;

        gzip on;
        gzip_min_length 1000;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

        proxy_pass_request_headers on;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Map X-Forwarded-Proto from ingress to real scheme
        set $real_scheme $scheme;
        if ($http_x_forwarded_proto) {
            set $real_scheme $http_x_forwarded_proto;
        }

        # Force browsers to upgrade any http:// sub-resource requests to https://
        # This prevents mixed content errors from MSAL silent iframes behind TLS-terminating ingress
        add_header Content-Security-Policy "upgrade-insecure-requests" always;

        # Serve under /prodvista/ subpath (AKS ingress forwards full path)
        location /prodvista/ {
            alias /usr/share/nginx/html/;
            try_files $uri $uri/ /index.html;
        }

        location = /prodvista {
            return 301 /prodvista/;
        }
              
        location / {
            		try_files $uri $uri/ /index.html;
        }
    }
}