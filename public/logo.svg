<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="barGradient1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <linearGradient id="barGradient2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
    <linearGradient id="barGradient3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="4" y="4" width="112" height="112" rx="24" fill="url(#logoGradient)"/>
  
  <!-- Inner panel - dashboard frame -->
  <rect x="16" y="20" width="88" height="80" rx="8" fill="white" fill-opacity="0.15"/>
  
  <!-- Dashboard header bar -->
  <rect x="20" y="24" width="80" height="8" rx="2" fill="white" fill-opacity="0.3"/>
  <circle cx="26" cy="28" r="2" fill="#EF4444"/>
  <circle cx="33" cy="28" r="2" fill="#F59E0B"/>
  <circle cx="40" cy="28" r="2" fill="#10B981"/>
  
  <!-- Chart bars (metrics visualization) -->
  <rect x="26" y="68" width="14" height="26" rx="3" fill="url(#barGradient1)"/>
  <rect x="46" y="52" width="14" height="42" rx="3" fill="url(#barGradient2)"/>
  <rect x="66" y="60" width="14" height="34" rx="3" fill="url(#barGradient3)"/>
  <rect x="86" y="44" width="14" height="50" rx="3" fill="white" fill-opacity="0.9"/>
  
  <!-- Trend line -->
  <path d="M26 62 L46 48 L66 54 L93 38" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="26" cy="62" r="4" fill="white"/>
  <circle cx="46" cy="48" r="4" fill="white"/>
  <circle cx="66" cy="54" r="4" fill="white"/>
  <circle cx="93" cy="38" r="4" fill="white"/>
</svg>
