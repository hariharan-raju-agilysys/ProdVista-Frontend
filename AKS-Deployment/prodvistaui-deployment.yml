---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prodvistaui
  namespace: agys-v1
  labels:
    app: prodvistaui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prodvistaui
  template:
    metadata:
      labels:
        app: prodvistaui
        version: IMAGE_TAG
    spec:
      nodeSelector:
        product: fiscal
      containers:
      - name: prodvistaui
        image: v1registrydev.azurecr.io/prodvistaui:IMAGE_TAG
        ports:
        - containerPort: 80
          name: http-web
        resources:
          requests:
            cpu: "0.1"
            memory: "1000Mi"
          limits:
            cpu: "2"
            memory: "4000Mi"
        lifecycle:
          preStop:
            exec:
              command: [ "/bin/bash", "-c", "sleep 20" ]
        envFrom:
        - configMapRef:
            name: prodvistaui-configmap
---

apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: prodvistaui-vs
  namespace: agys-v1
spec:
  hosts:
  - "aks-v1-dev.hospitalityrevolution.com"
  gateways:
  - agys-v1-gateway

  http:
  # ProdVista SPA routes - all go to frontend nginx
  - match:
    - uri:
        prefix: /login
    - uri:
        prefix: /dashboard
    - uri:
        prefix: /ai-query
    - uri:
        prefix: /release-notes
    - uri:
        prefix: /command-center
    - uri:
        prefix: /azure-setup
    - uri:
        prefix: /settings
    - uri:
        prefix: /bugs
    - uri:
        prefix: /assets
    - uri:
        exact: /prodvista
    - uri:
        exact: /prodvista/
    - uri:
        prefix: /prodvista/dashboard
    - uri:
        prefix: /prodvista/login
    - uri:
        prefix: /prodvista/ai-query
    - uri:
        prefix: /prodvista/release-notes
    - uri:
        prefix: /prodvista/command-center
    - uri:
        prefix: /prodvista/azure-setup
    - uri:
        prefix: /prodvista/settings
    - uri:
        prefix: /prodvista/bugs
    - uri:
        prefix: /prodvista/assets
    headers:
      response:
        add:
          Access-Control-Allow-Origin: "*"
          Content-Security-Policy: "frame-ancestors 'self' *.hospitalityrevolution.com *.rguest.com; form-action 'self' https://core-int.hospitalityrevolution.com https://*.hospitalityrevolution.com; base-uri 'self'; default-src 'self' * blob: 'unsafe-inline' 'unsafe-eval' data: api.openweathermap.org *.rguest.com *.hospitalityrevolution.com *.googleapis.com *.gstatic.com *.fullstory.com *.google.com *.qaigasp.com *.jsdelivr.net http://localhost:* ;"
          Expires: "0"
          Permissions-Policy: "accelerometer=(), camera=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
          Referrer-Policy: "no-referrer"
          Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "DENY"
          X-Permitted-Cross-Domain-Policies: "none"
          X-Xss-Protection: "1; mode=block"
          accept-encoding: "gzip;q=0,deflate;q=0"
        remove:
        - x-envoy-peer-metadata
        - x-envoy-peer-metadata-id

    route:
    - destination:
        host: prodvistaui.agys-v1.svc.cluster.local
        port:
          number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: prodvistaui
  namespace: agys-v1
  labels:
    app: prodvistaui
spec:
  selector:
    app: prodvistaui
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
---
