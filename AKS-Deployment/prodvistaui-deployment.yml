---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prodvistaui
  namespace: agys-v1
  labels:
    app: prodvistaui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prodvistaui
  template:
    metadata:
      labels:
        app: prodvistaui
        version: 0.0.0.0
    spec:
      nodeSelector:
        product: fiscal
      containers:
      - name: prodvistaui
        image: v1registrydev.azurecr.io/prodvistaui:0.0.0.0
        ports:
        - containerPort: 80
          name: http-web
        resources:
          requests:
            cpu: "0.1"
            memory: "1000Mi"
          limits:
            cpu: "2"
            memory: "4000Mi"
        lifecycle:
          preStop:
            exec:
              command: [ "/bin/bash", "-c", "sleep 20" ]
        envFrom:
        - configMapRef:
            name: prodvistaui-configmap
---

apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: prodvista-vs
  namespace: agys-v1
spec:
  hosts:
  - "aks-v1-dev.hospitalityrevolution.com"
  gateways:
  - agys-v1-gateway

  http:
  # 1. ProdVista API routes — MUST be before the SPA catch-all
  - match:
    - uri:
        prefix: /prodvista/api/
    rewrite:
      uri: /api/
    headers:
      request:
        set:
          x-forwarded-prefix: "/prodvista"
    route:
    - destination:
        host: prodvista.agys-v1.svc.cluster.local
        port:
          number: 5000
    timeout: 3600s

  # 2. Swagger/API docs
  - match:
    - uri:
        prefix: /prodvistaapi/swagger/
    headers:
      request:
        set:
          x-forwarded-prefix: "/prodvista"
    route:
    - destination:
        host: prodvista.agys-v1.svc.cluster.local
        port:
          number: 5000
    timeout: 3600s

  # 3. SignalR hubs (WebSocket support, long timeout for persistent connections)
  - match:
    - uri:
        prefix: /prodvista/hubs/
    rewrite:
      uri: /hubs/
    headers:
      request:
        set:
          x-forwarded-prefix: "/prodvista"
    route:
    - destination:
        host: prodvista.agys-v1.svc.cluster.local
        port:
          number: 5000
    timeout: 3600s

  # 4. ProdVista SPA catch-all — MUST be LAST (after API/hubs routes)
  - match:
    - uri:
        exact: /prodvista
    - uri:
        prefix: /prodvista/
    - uri:
        prefix: /assets
    headers:
      response:
        add:
          Access-Control-Allow-Origin: "*"
          Content-Security-Policy: "frame-ancestors 'self' *.hospitalityrevolution.com *.rguest.com; form-action 'self' https://core-int.hospitalityrevolution.com https://*.hospitalityrevolution.com; base-uri 'self'; default-src 'self' * blob: 'unsafe-inline' 'unsafe-eval' data: api.openweathermap.org *.rguest.com *.hospitalityrevolution.com *.googleapis.com *.gstatic.com *.fullstory.com *.google.com *.qaigasp.com *.jsdelivr.net http://localhost:* ;"
          Expires: "0"
          Permissions-Policy: "accelerometer=(), camera=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
          Referrer-Policy: "no-referrer"
          Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "DENY"
          X-Permitted-Cross-Domain-Policies: "none"
          X-Xss-Protection: "1; mode=block"
          accept-encoding: "gzip;q=0,deflate;q=0"
        remove:
        - x-envoy-peer-metadata
        - x-envoy-peer-metadata-id
    route:
    - destination:
        host: prodvistaui.agys-v1.svc.cluster.local
        port:
          number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: prodvistaui
  namespace: agys-v1
  labels:
    app: prodvistaui
spec:
  selector:
    app: prodvistaui
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
---
